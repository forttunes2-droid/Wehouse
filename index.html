    <!-- Version: 20250707-011 -->
    <script>window.WH_VERSION='20250707-011';</script>
    <!-- EMERGENCY: One-time cache kill -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        // Check if we already killed the old SW in this session
        if (sessionStorage.getItem('sw_done')) return;
        // Check if any SW is controlling this page
        if (!navigator.serviceWorker.controller) return;
        // Old SW is active - register kill-switch to replace it
        navigator.serviceWorker.register('/sw.js').then(function() {
          // Kill-switch will activate, clear caches, reload page, then unregister
          sessionStorage.setItem('sw_done', '1');
        }).catch(function() {
          // Fallback: manual unregister
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            Promise.all(regs.map(function(r) { return r.unregister(); }));
          });
        });
      })();
    </script>

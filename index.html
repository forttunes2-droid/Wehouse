    <!-- Version: 20250707-007 -->

    <!-- EMERGENCY: Kill old service worker + clear caches -->
    <script>
      (function() {
        // Already cleared this session — let React load normally
        if (sessionStorage.getItem('wh_cleared')) return;

        // No service worker support or no SW controlling this page
        if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
          // Still mark as cleared so we don't check again this session
          sessionStorage.setItem('wh_cleared', '1');
          return;
        }

        // OLD SW IS ACTIVE — kill it before React loads
        // 1. Hide React root so stale app doesn't render
        document.documentElement.style.display = 'none';

        // 2. Mark that we're clearing (prevents loop on reload)
        sessionStorage.setItem('wh_cleared', '1');

        // 3. Unregister ALL existing SWs, then register new kill-switch SW
        //    The new SW takes over via skipWaiting + clients.claim,
        //    clears all caches, then self-destructs.
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        }).then(function() {
          // Register new kill-switch SW — it will take over immediately
          return navigator.serviceWorker.register('/sw.js');
        }).catch(function(err) {
          // Registration failed — fall back to just clearing caches
          console.error('[KillSwitch] SW registration failed:', err);
          if ('caches' in window) {
            return caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            });
          }
        }).then(function() {
          // Give the new SW 1 second to activate, claim, and clear caches
          setTimeout(function() {
            // Hard reload — bypasses any remaining cache
            window.location.reload(true);
          }, 1000);
        });
      })();
    </script>

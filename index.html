    <!-- EMERGENCY: Nuclear cache kill — works on ALL devices including iOS Safari -->
    <script>
      (function() {
        // Only run once per session to prevent infinite reloads
        if (sessionStorage.getItem('wh_nuked')) return;
        sessionStorage.setItem('wh_nuked', '1');

        var hasSW = 'serviceWorker' in navigator;
        var hasCache = 'caches' in window;

        function nuke() {
          var promises = [];

          // 1. Unregister ALL service workers
          if (hasSW) {
            promises.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
            );
          }

          // 2. Delete ALL caches
          if (hasCache) {
            promises.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              })
            );
          }

          // 3. Always reload — even if promises fail
          return Promise.all(promises).catch(function() {}).then(function() {
            // Hard reload with cache bypass
            window.location.reload(true);
          });
        }

        // Run immediately
        nuke();
      })();
    </script>

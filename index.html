    <!-- EMERGENCY: Force install kill-switch service worker -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        // Already reloaded after kill? Continue normally.
        if (sessionStorage.getItem('sw_killed')) { sessionStorage.removeItem('sw_killed'); return; }
        // Force register the kill-switch SW (triggers update check against old SW)
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          // Listen for new worker to activate
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'activated') {
                sessionStorage.setItem('sw_killed', '1');
                window.location.reload();
              }
            });
          });
          // If kill-switch already active, reload fresh
          if (reg.active && !reg.waiting && !reg.installing) {
            reg.active.postMessage('KILL');
          }
        }).catch(function() {
          // If registration fails, try manual unregister + reload
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            Promise.all(regs.map(function(r) { return r.unregister(); })).then(function() {
              sessionStorage.setItem('sw_killed', '1');
              window.location.reload();
            });
          });
        });
      })();
    </script>

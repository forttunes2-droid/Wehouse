<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="background-color" content="#0A0A0F" />
    <meta name="description" content="WeHouse - Find houses, connect with roommates, hire verified workers" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WeHouse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WeHouse" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="mask-icon" href="/icon-192.png" color="#3B82F6" />

    <!-- Preconnect to Supabase -->
    <link rel="preconnect" href="https://btpqlxmqaqfttmtllegx.supabase.co" />

    <title>WeHouse</title>

    <style>
      /* Prevent flash of white on load */
      html, body { background: #0A0A0F; }
      /* Safe area padding for notched devices */
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Version-based cache clearing — only clears when version changes
      (function() {
        var CURRENT_VERSION = 'v3-2026-05-28';
        var stored = localStorage.getItem('wh_app_version');
        if (stored !== CURRENT_VERSION) {
          // New version detected — clear everything and reload
          localStorage.setItem('wh_app_version', CURRENT_VERSION);
          if ('caches' in window) {
            caches.keys().then(function(names) {
              return Promise.all(names.map(function(n) { return caches.delete(n); }));
            }).then(function() {
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  return Promise.all(regs.map(function(r) { return r.unregister(); }));
                }).then(function() {
                  // Force reload once to get fresh code
                  if (!window.location.search.includes('refreshed=1')) {
                    window.location.href = window.location.pathname + '?refreshed=1';
                  }
                });
              }
            });
          }
        }
      })();
    </script>
  </body>
</html>

    <meta http-equiv="Expires" content="-1" />
    <!-- Version: 20250722-002 -->
    <script>window.WH_VERSION='20250722-002';</script>
    <!-- EMERGENCY: Unregister old service worker and reload fresh -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;
        var reloaded = sessionStorage.getItem('sw_killed');
        if (reloaded) { sessionStorage.removeItem('sw_killed'); return; }
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length === 0) return;
          var promises = regs.map(function(r) { return r.unregister(); });
          if (window.caches) {
            caches.keys().then(function(names) {
              names.forEach(function(n) { caches.delete(n); });
            });
          }
          Promise.all(promises).then(function() {
            sessionStorage.setItem('sw_killed', '1');
            window.location.reload();
          });
        });
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

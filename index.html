    <!-- Version: 20250707-006 -->
    <script>window.WH_VERSION='20250707-006';</script>
    <!-- EMERGENCY: Cache kill — retries up to 3x with cache-busting URL -->
    <script>
      (function() {
        var count = parseInt(sessionStorage.getItem('wh_kill_count') || '0');

        function clearAll() {
          var promises = [];
          if ('serviceWorker' in navigator) {
            promises.push(
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                return Promise.all(regs.map(function(r) { return r.unregister(); }));
              })
            );
          }
          if ('caches' in window) {
            promises.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              })
            );
          }
          return Promise.all(promises).catch(function() {});
        }

        // Always clear SWs/caches silently (fast, no reload needed)
        clearAll();

        // If old SW might still be serving stale HTML, force a fresh load
        // (up to 3 attempts, each with a unique cache-busting URL)
        if (count < 3) {
          sessionStorage.setItem('wh_kill_count', String(count + 1));
          var url = window.location.href.split('?')[0].split('#')[0];
          var sep = url.indexOf('?') === -1 ? '?' : '&';
          var freshUrl = url + sep + '_fresh=' + Date.now();
          // Use replace so back button doesn't loop
          setTimeout(function() {
            window.location.replace(freshUrl);
          }, 100);
        }
      })();
    </script>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="background-color" content="#0A0A0F" />
    <meta name="description" content="WeHouse - Find houses, connect with roommates, hire verified workers" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WeHouse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WeHouse" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="mask-icon" href="/icon-192.png" color="#3B82F6" />

    <!-- Preconnect to Supabase -->
    <link rel="preconnect" href="https://btpqlxmqaqfttmtllegx.supabase.co" />

    <title>WeHouse</title>

    <style>
      /* Prevent flash of white on load */
      html, body { background: #0A0A0F; }
      /* Safe area padding for notched devices */
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Auto-detect new deployments — checks every 1 hour + when returning from background
      (function() {
        var STORAGE_KEY = 'wh_sw_hash';
        var CHECK_INTERVAL = 60 * 60 * 1000; // 1 hour
        var lastHash = localStorage.getItem(STORAGE_KEY) || '';
        var hasRefreshed = false; // Prevent double-reload

        function checkForUpdate() {
          if (hasRefreshed) return; // Already refreshed this session
          fetch('/sw.js?_=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.text(); })
            .then(function(text) {
              var currentHash = btoa(text.slice(0, 200));
              if (lastHash && lastHash !== currentHash) {
                hasRefreshed = true;
                localStorage.setItem(STORAGE_KEY, currentHash);
                window.location.reload();
              } else {
                localStorage.setItem(STORAGE_KEY, currentHash);
              }
            })
            .catch(function() {});
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        }

        // Check once on load (after 3 seconds)
        setTimeout(checkForUpdate, 3000);

        // Check every 1 hour
        setInterval(checkForUpdate, CHECK_INTERVAL);

        // Check when returning from background (but not more than once per 5 min)
        var lastBgCheck = 0;
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible' && Date.now() - lastBgCheck > 5 * 60 * 1000) {
            lastBgCheck = Date.now();
            checkForUpdate();
          }
        });
      })();
    </script>
  </body>
</html>

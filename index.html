<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="background-color" content="#0A0A0F" />
    <meta name="description" content="WeHouse - Find houses, connect with roommates, hire verified workers" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WeHouse" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="WeHouse" />
    <meta name="msapplication-TileColor" content="#0A0A0F" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="mask-icon" href="/icon-192.png" color="#3B82F6" />

    <!-- Preconnect to Supabase -->
    <link rel="preconnect" href="https://btpqlxmqaqfttmtllegx.supabase.co" />

    <title>WeHouse</title>

    <style>
      /* Prevent flash of white on load */
      html, body { background: #0A0A0F; }
      /* Safe area padding for notched devices */
      .safe-area-top { padding-top: env(safe-area-inset-top); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Auto-detect new deployments and force refresh
      (function() {
        var STORAGE_KEY = 'wh_sw_hash';
        var lastHash = localStorage.getItem(STORAGE_KEY) || '';

        // Check by fetching index.html (script src hashes change every build)
        function checkForUpdate() {
          fetch('/?_=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.text(); })
            .then(function(text) {
              // Extract the script src hash from the HTML
              var match = text.match(/src="\/assets\/main-([^.]+)/);
              var currentHash = match ? match[1] : Date.now().toString();
              if (lastHash && lastHash !== currentHash) {
                // New deployment detected!
                localStorage.setItem(STORAGE_KEY, currentHash);
                // Unregister old SW and reload
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(regs) {
                    return Promise.all(regs.map(function(r) { return r.unregister(); }));
                  }).then(function() {
                    window.location.reload();
                  }).catch(function() {
                    window.location.reload();
                  });
                } else {
                  window.location.reload();
                }
              } else {
                localStorage.setItem(STORAGE_KEY, currentHash);
              }
            })
            .catch(function() {});
        }

        // 1. Register service worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js').then(function(reg) {
            reg.update();
            reg.addEventListener('updatefound', function() {
              var newWorker = reg.installing;
              newWorker.addEventListener('statechange', function() {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage('SKIP_WAITING');
                  window.location.reload();
                }
              });
            });
          }).catch(function() {});
        }

        // 2. Check for new deployments
        checkForUpdate(); // On load
        setInterval(checkForUpdate, 60 * 1000); // Every 60 seconds
        document.addEventListener('visibilitychange', function() { // When returning from background
          if (document.visibilityState === 'visible') checkForUpdate();
        });
      })();
    </script>
  </body>
</html>

    <script>
      // Force service worker update on every load
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js?v=20250721').then(function(reg) {
          // Check for updates immediately
          reg.update();
          // If new worker is waiting, force it to activate
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                // New version available, force activate
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }).catch(function() {});
        // When new worker takes control, reload to get fresh code
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          window.location.reload();
        });
      }
    </script>
